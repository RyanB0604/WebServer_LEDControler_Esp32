<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP Hosted website!</title>
    <link rel="stylesheet" href="styles.css">
    </link>

</head>

<body id="body">
    <header>
        <h1>Welcome to my ESP32 hosted site!</h1>
    </header>
    <div id="content">
        <h3>
            Here are some buttons programmed to interact with your esp32
        </h3>
        <div id="buttonContainer">
            <button id="greenLED_toggle" class="espInteractionButton">Click to toggle GREEN LED!</button>
            <br>
            <button id="yellowLED_toggle" class="espInteractionButton">Click to toggle YELLOW LED!</button>
            <br>
            <button id="redLED_toggle" class="espInteractionButton">Click to toggle RED LED!</button>
            <br>
            <button id="xmas_toggle" class="espInteractionButton">Click to toggle Xmas!</button>


        </div>

    </div>
    <script src="ledFunctionality.js"></script>
</body>

</html>
